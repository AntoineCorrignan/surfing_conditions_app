name: Surf conditions pipeline

on:
  schedule:
    # GitHub Actions utilise UTC. Ces quatre horaires couvrent minuit et midi
    # en Europe/Paris, en heure d'été comme en heure d'hiver.
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"
    - cron: "0 22 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch: {}

jobs:
  run-surf-pipeline:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check Paris schedule
        id: schedule-check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          scheduled_cron="${{ github.event.schedule }}"
          scheduled_hour="$(echo "$scheduled_cron" | awk '{print $2}')"
          paris_offset="$(TZ=Europe/Paris date +%z)"

          if [ "$paris_offset" = "+0200" ]; then
            valid_hours="10 22"
          else
            valid_hours="11 23"
          fi

          if [[ " $valid_hours " == *" $scheduled_hour "* ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Running scheduled cron '$scheduled_cron' for Europe/Paris offset $paris_offset."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled cron '$scheduled_cron' for Europe/Paris offset $paris_offset."
          fi

      - name: Checkout repository
        if: steps.schedule-check.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.schedule-check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements-backend.txt"

      - name: Install dependencies
        if: steps.schedule-check.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-backend.txt

      - name: Run surf backend
        if: steps.schedule-check.outputs.should_run == 'true'
        run: python surf_backend.py
