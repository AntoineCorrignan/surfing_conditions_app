name: Surf conditions pipeline

on:
  schedule:
    # GitHub Actions utilise UTC. Ces quatre horaires couvrent minuit et midi
    # en Europe/Paris, en heure d'été comme en heure d'hiver.
    - cron: "0 10,11,22,23 * * *"
  workflow_dispatch: {}

jobs:
  run-surf-pipeline:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check Paris schedule
        id: schedule-check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          paris_hour="$(TZ=Europe/Paris date +%H)"
          if [ "$paris_hour" = "00" ] || [ "$paris_hour" = "12" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping run: current Europe/Paris hour is $paris_hour."
          fi

      - name: Checkout repository
        if: steps.schedule-check.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.schedule-check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.schedule-check.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run surf backend
        if: steps.schedule-check.outputs.should_run == 'true'
        run: python surf_backend.py
