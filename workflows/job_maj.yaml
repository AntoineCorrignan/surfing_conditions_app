name: Surf conditions pipeline

on:
  schedule:
    # Tous les jours à 05:00 UTC
    # (06:00 en hiver / 07:00 en été en France)
    - cron: "0 5 * * *"
  workflow_dispatch: {}  # Lancement manuel possible

jobs:
  run-surf-pipeline:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SURF_SCORE_THRESHOLD: ${{ secrets.SURF_SCORE_THRESHOLD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run surf backend
        run: |
          python surf_backend.py
